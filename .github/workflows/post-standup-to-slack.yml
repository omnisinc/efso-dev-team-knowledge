# standup 議事録が main に push されたら、同日の Slack SU スレッドに自動投稿する。
#
# 前提:
#   - Bot が対象チャンネルに招待済み
#   - Secrets に SLACK_BOT_TOKEN, SLACK_CHANNEL_ID が設定済み
#   - 対象日に「今日の SU スレです」のリマインダーメッセージが存在すること

name: Post standup minutes to Slack

on:
  push:
    branches: [main]
    paths:
      - "standup/**/*.md"
      - "!standup/templates/**"

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # before..HEAD の diff に必要
          fetch-depth: 2

      # 変更された議事録ファイルを検出 (削除・テンプレートは除外)
      - name: Detect changed standup files
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=d ${{ github.event.before }} HEAD -- 'standup/**/*.md' | grep -v 'standup/templates/' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # 各議事録ファイルを Slack スレッドに投稿
      - name: Post to Slack
        if: steps.changed.outputs.files != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Processing: $file"
            python3 .github/scripts/post_standup_to_slack.py "$file"
          done <<< "${{ steps.changed.outputs.files }}"
